version: '3.8'

services:
  airconnect-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: airconnect-app
    ports:
      - "${PORT}:${PORT}"
    environment:
      PORT: ${PORT}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}

      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      REDIS_URL: redis://redis:6379

      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}

      TEAM_ID: ${TEAM_ID}
      KEY_ID: ${KEY_ID}
      BUNDLE_ID: ${BUNDLE_ID}
      KEY_PATH: ${KEY_PATH}

      PROFILE_IMAGE_URL_BASE: ${PROFILE_IMAGE_URL_BASE}
      PROFILE_IMAGE_DIR: ${APP_UPLOAD_PROFILE_IMAGE_DIR}
    volumes:
      - "./profile-images:${APP_UPLOAD_PROFILE_IMAGE_DIR}"
      - "./logs:/app/logs"
      - "./src/main/resources/key:/app/key"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - airconnect-network
    restart: always

  mysql:
    image: mysql:8.0
    container_name: airconnect-mysql
    ports:
      - "${DB_PORT}:3306"
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - "./mysql-data:/var/lib/mysql"
    networks:
      - airconnect-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7.2-alpine
    container_name: airconnect-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - "./redis-data:/data"
    networks:
      - airconnect-network
    restart: always

networks:
  airconnect-network:
    driver: bridge