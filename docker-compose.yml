version: '3.8'

services:
  airconnect-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}

      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      REDIS_URL: redis://redis:6379

      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      JWT_SECRET: ${JWT_SECRET}

      TEAM_ID: ${TEAM_ID}
      KEY_ID: ${KEY_ID}
      BUNDLE_ID: ${BUNDLE_ID}
      KEY_PATH: ${KEY_PATH}

      PROFILE_IMAGE_URL_BASE: ${PROFILE_IMAGE_URL_BASE}
      PROFILE_IMAGE_DIR: ${PROFILE_IMAGE_DIR}

      NOTIFICATION_PUSH_FCM_ENABLED: ${NOTIFICATION_PUSH_FCM_ENABLED}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH}
      FIREBASE_APP_NAME: ${FIREBASE_APP_NAME}
      NOTIFICATION_OUTBOX_WORKER_ENABLED: ${NOTIFICATION_OUTBOX_WORKER_ENABLED}
      IAP_ENABLED: ${IAP_ENABLED:-false}
    volumes:
      - "./profile-images:${PROFILE_IMAGE_DIR}"
      - "./logs:/app/logs"
      - "./src/main/resources/key:/app/key"
      - "./secrets/firebase-service-account.json:/app/secrets/firebase-service-account.json:ro"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - airconnect-network
    restart: always

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - "./mysql-data:/var/lib/mysql"
    ports:
          - "3307:3306"
    networks:
      - airconnect-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - "./redis-data:/data"
    networks:
      - airconnect-network
    restart: always

networks:
  airconnect-network:
    driver: bridge
