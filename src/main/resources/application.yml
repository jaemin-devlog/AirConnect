server:
  port: 8080

spring:
  application:
    name: airconnect
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  web:
    resources:
      # 정적 리소스 경로를 명시적으로 제한하여 /api/** 경로가 정적 리소스로 처리되지 않도록 함
      static-locations: classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/templates/
  jackson:
    serialization:
      # null 값도 포함하여 직렬화
      write-null-map-values: true
    default-property-inclusion: always

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:}
  upload:
    profile-image-dir: ${PROFILE_IMAGE_DIR:/tmp/airconnect/profile-images}
    profile-image-url-base: ${PROFILE_IMAGE_URL_BASE:http://localhost:8080/api/v1/users/profile-images}
    profile-image-max-bytes: ${PROFILE_IMAGE_MAX_BYTES:5242880}
    profile-image-max-pixels: ${PROFILE_IMAGE_MAX_PIXELS:25000000}
    profile-image-allowed-formats: ${PROFILE_IMAGE_ALLOWED_FORMATS:jpg,jpeg,png}
    profile-image-hidden-user-statuses: ${PROFILE_IMAGE_HIDDEN_USER_STATUSES:DELETED,SUSPENDED}
  websocket:
    allowed-origin-patterns: ${WS_ALLOWED_ORIGIN_PATTERNS:}
    inbound:
      core-pool-size: ${WS_INBOUND_CORE_POOL_SIZE:16}
      max-pool-size: ${WS_INBOUND_MAX_POOL_SIZE:64}
      queue-capacity: ${WS_INBOUND_QUEUE_CAPACITY:5000}
      keep-alive-seconds: ${WS_INBOUND_KEEP_ALIVE_SECONDS:60}
    outbound:
      core-pool-size: ${WS_OUTBOUND_CORE_POOL_SIZE:16}
      max-pool-size: ${WS_OUTBOUND_MAX_POOL_SIZE:64}
      queue-capacity: ${WS_OUTBOUND_QUEUE_CAPACITY:5000}
      keep-alive-seconds: ${WS_OUTBOUND_KEEP_ALIVE_SECONDS:60}
    transport:
      send-time-limit-ms: ${WS_SEND_TIME_LIMIT_MS:15000}
      send-buffer-size-limit-bytes: ${WS_SEND_BUFFER_SIZE_LIMIT_BYTES:1048576}
      message-size-limit-bytes: ${WS_MESSAGE_SIZE_LIMIT_BYTES:131072}
    ops:
      report-interval-ms: ${WS_OPS_REPORT_INTERVAL_MS:60000}
      inbound-failure-warn-threshold: ${WS_OPS_INBOUND_FAILURE_WARN_THRESHOLD:20}

matching:
  queue:
    worker:
      enabled: ${MATCHING_QUEUE_WORKER_ENABLED:true}
      delay-ms: ${MATCHING_QUEUE_WORKER_DELAY_MS:1000}

notification:
  outbox:
    worker:
      enabled: false
      delay-ms: 1000
      recovery-delay-ms: 60000
  push:
    fcm:
      enabled: false
      app-name: airconnect-notification
      project-id: ${FIREBASE_PROJECT_ID:}
      credentials-path: ${FIREBASE_CREDENTIALS_PATH:}

iap:
  enabled: ${IAP_ENABLED:false}
  apple:
    bundle-id: ${IAP_APPLE_BUNDLE_ID:com.airconnect.app}
    environment: ${IAP_APPLE_ENVIRONMENT:PRODUCTION}
    allowed-product-ids: ${IAP_APPLE_ALLOWED_PRODUCT_IDS:}
  google:
    package-name: ${IAP_GOOGLE_PACKAGE_NAME:com.airconnect.app}
    service-account-json-path: ${IAP_GOOGLE_SERVICE_ACCOUNT_JSON_PATH:}
    verify-enabled: ${IAP_GOOGLE_VERIFY_ENABLED:false}

apple:
  team-id: ${APPLE_TEAM_ID:}
  key-id: ${APPLE_KEY_ID:}
  client-id: ${APPLE_CLIENT_ID:}
  service-id: ${APPLE_SERVICE_ID:}
  private-key-path: ${APPLE_PRIVATE_KEY_PATH:}
  # backward compatibility for legacy key names
  bundle-id: ${BUNDLE_ID:}
  key-path: ${KEY_PATH:}
  login:
    issuer: ${APPLE_LOGIN_ISSUER:https://appleid.apple.com}
    jwks-url: ${APPLE_LOGIN_JWKS_URL:https://appleid.apple.com/auth/keys}
    allowed-audiences: ${APPLE_LOGIN_ALLOWED_AUDIENCES:}
  revoke:
    enabled: ${APPLE_REVOKE_ENABLED:true}
    client-id: ${APPLE_REVOKE_CLIENT_ID:${APPLE_CLIENT_ID:}}
    endpoint: ${APPLE_REVOKE_ENDPOINT:https://appleid.apple.com/auth/revoke}
    client-secret-ttl-seconds: ${APPLE_CLIENT_SECRET_TTL_SECONDS:300}

moderation:
  report:
    duplicate-window-minutes: ${MODERATION_REPORT_DUPLICATE_WINDOW_MINUTES:60}
  support:
    email: ${SUPPORT_EMAIL:}
    url: ${SUPPORT_URL:}
    contact-text: ${SUPPORT_CONTACT_TEXT:}
