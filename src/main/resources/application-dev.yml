server:
  port: ${PORT:8080}

spring:
  application:
    name: airconnect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  web:
    resources:
      static-locations: classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/templates/

  jackson:
    default-property-inclusion: always
    serialization:
      write-dates-as-timestamps: false
      write-null-map-values: true
    time-zone: Asia/Seoul

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      url: ${REDIS_URL}

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO
    univ.airconnect: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

kakao:
  base-url: https://kapi.kakao.com
  me-path: /v2/user/me

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
  refresh-token-expiration-seconds: ${JWT_REFRESH_TOKEN_EXPIRATION_SECONDS:2592000}

apple:
  team-id: ${TEAM_ID}
  key-id: ${KEY_ID}
  bundle-id: ${BUNDLE_ID}
  key-path: ${KEY_PATH}

app:
  upload:
    profile-image-dir: ${PROFILE_IMAGE_DIR:/var/lib/airconnect/profile-images}
    profile-image-url-base: ${PROFILE_IMAGE_URL_BASE}

notification:
  outbox:
    worker:
      enabled: ${NOTIFICATION_OUTBOX_WORKER_ENABLED:true}
      delay-ms: ${NOTIFICATION_OUTBOX_WORKER_DELAY_MS:1000}
      recovery-delay-ms: ${NOTIFICATION_OUTBOX_WORKER_RECOVERY_DELAY_MS:60000}
  push:
    fcm:
      enabled: ${NOTIFICATION_PUSH_FCM_ENABLED:true}
      app-name: ${FIREBASE_APP_NAME:airconnect-notification}
      project-id: ${FIREBASE_PROJECT_ID:}
      credentials-path: ${FIREBASE_CREDENTIALS_PATH:}


