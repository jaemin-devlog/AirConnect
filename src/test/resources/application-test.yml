spring:
  datasource:
    url: jdbc:h2:mem:airconnect_test;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: never

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: localhost
    port: 25
    username: test
    password: test

  main:
    allow-bean-definition-overriding: true

matching:
  cache:
    enabled: false
  lock:
    enabled: false
  queue:
    worker:
      enabled: false

jwt:
  # test 전용 더미 시크릿(HS256 최소 256-bit 이상 필요)
  secret: "testtesttesttesttesttesttesttesttesttest"
  access-token-expiration-seconds: 3600
  refresh-token-expiration-seconds: 2592000

iap:
  apple:
    bundle-id: com.airconnect.app
    environment: SANDBOX
  google:
    package-name: com.airconnect.app
    service-account-json-path: /tmp/not-used.json
    verify-enabled: false

